<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VibePrinting :D - Morandi Art Studio</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/body-pix@2.2.0/dist/body-pix.min.js"></script>
    <style>
        :root {
            --bg-color: rgb(251, 242, 245);
            --panel-bg: #FEFDF5;
            --text-brown: #625044;
            --morandi-green: #bfda9d;
            --morandi-blue: #95c5e8;
            --radius-box: 20px;
            --shadow: 0 10px 30px rgba(111, 78, 55, 0.08);
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-brown);
            font-family: -apple-system, "SF Pro SC", "Noto Sans SC", sans-serif;
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        nav {
            height: 70px; background: var(--panel-bg); display: flex; 
            justify-content: space-between; align-items: center; 
            padding: 0 40px; border-bottom: 2px solid rgba(111, 78, 55, 0.05); z-index: 1000;
        }
        .logo { font-weight: 900; font-size: 1.6rem; letter-spacing: 1px; }
        .btn-p {
            background: var(--text-brown); color: white; border: none;
            padding: 12px 28px; border-radius: 50px;
            cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .btn-p:hover { opacity: 0.9; transform: translateY(-1px); }
        main { flex: 1; display: flex; position: relative; }
        .sidebar {
            width: 320px; padding: 25px; background: rgba(254, 253, 245, 0.4);
            display: flex; flex-direction: column; gap: 15px; border-right: 1px solid rgba(111, 78, 55, 0.05);
            overflow-y: auto;
        }
        .control-group {
            background: var(--panel-bg); padding: 18px 22px; border-radius: var(--radius-box);
            box-shadow: var(--shadow); display: flex; flex-direction: column; gap: 12px;
        }
        .control-header { display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        input[type="range"] { -webkit-appearance: none; appearance: none; width: 100%; background: transparent; cursor: pointer; }
        input[type="range"]::-webkit-slider-runnable-track { background: #E0E0E0; height: 8px; border-radius: 4px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; height: 22px; width: 22px; border-radius: 50%; background: var(--morandi-green); margin-top: -7px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        .color-preview { width: 45px; height: 45px; border-radius: 12px; background: #2B4C9B; border: 3px solid white; box-shadow: var(--shadow); cursor: pointer; }
        .workspace { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px; position: relative; }
        #canvas-wrap { position: relative; border-radius: var(--radius-box); overflow: hidden; box-shadow: var(--shadow); }
        canvas { max-width: 100%; max-height: 80vh; background: white; cursor: grab; }
        .overlay { position: absolute; inset: 0; background: var(--bg-color); z-index: 500; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .upload-card { background: var(--panel-bg); padding: 50px; border-radius: 32px; box-shadow: var(--shadow); text-align: center; width: 400px; }
        .disabled { opacity: 0.3; pointer-events: none; filter: grayscale(1); }
        .sticker-container { position: relative; width: 100%; margin-top: auto; }
        #sticker-menu {
            position: absolute; bottom: 70px; left: 50%; transform: translateX(-50%);
            background: white; border-radius: 15px; border: 2px solid var(--text-brown);
            padding: 10px; display: none; flex-direction: column; gap: 8px;
            box-shadow: var(--shadow); z-index: 2000; width: 150px;
        }
        .sticker-opt {
            background: var(--panel-bg); border: 1px solid #EEE; padding: 8px;
            border-radius: 10px; cursor: pointer; font-size: 0.9rem; font-weight: bold;
        }

        @media screen and (max-width: 768px) {
            nav { padding: 0 15px; height: 60px; }
            .logo { font-size: 1.1rem; }
            nav .btn-p { padding: 8px 12px; font-size: 0.85rem; border-radius: 12px; }
            main { flex-direction: column; overflow-y: auto; }
            .sidebar { width: 100%; order: 2; border-right: none; height: auto; padding: 15px; overflow-y: visible; }
            .workspace { order: 1; padding: 10px; min-height: 40vh; flex: none; display: flex; align-items: center; }
            .upload-card { width: 280px; height: 280px; padding: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 20px; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">VibePrinting</div>
        <div style="display:flex; gap:15px;">
            <button class="btn-p" style="background:#B9B4A7;" onclick="location.reload()">重新上传</button>
            <button class="btn-p" onclick="exportArt()">导出作品</button>
        </div>
    </nav>
    <main>
        <aside id="sidebar" class="sidebar disabled">
            <div class="control-group">
                <div class="control-header"><label>颜色</label></div>
                <div style="display:flex; align-items:center; gap:15px;">
                    <div id="inkPrev" class="color-preview" onclick="document.getElementById('inkColor').click()"></div>
                    <input type="color" id="inkColor" value="#2B4C9B" style="opacity:0; width:0; height:0;">
                </div>
            </div>
            <div class="control-group">
                <div class="control-header"><label>网点大小</label><span id="dotVal">7</span></div>
                <input type="range" id="dotIn" min="1" max="10" value="7">
            </div>
            <div class="control-group">
                <div class="control-header"><label>对比度</label><span id="threshVal">5</span></div>
                <input type="range" id="threshIn" min="1" max="10" value="5">
            </div>
            <div class="control-group" style="cursor:pointer; text-align:center; background: var(--morandi-blue); color:white;" onclick="randomize()">
                <div style="font-weight:900;">🎲 随机一下参数</div>
            </div>
            <div class="sticker-container">
                <div id="sticker-menu">
                    <button class="sticker-opt" onclick="applyRealSticker('stars')">星星</button>
                    <button class="sticker-opt" onclick="applyRealSticker('y2k')">复古y2k</button>
                    <button class="sticker-opt" onclick="applyRealSticker('dog')">美式复古</button>
                    <button class="sticker-opt" onclick="applyRealSticker('cat')">Hello Kitty</button>
                    <button class="sticker-opt" onclick="applyRealSticker('star2')">另一种星星</button>
                </div>
                <button class="btn-p" id="sticker-main-btn" style="width:100%; background: var(--morandi-green);" onclick="toggleStickerMenu()">🌟 贴纸一下</button>
            </div>
        </aside>
        <div class="workspace">
            <div id="step-layer" class="overlay">
                <div class="upload-card">
                    <h2 style="margin: 0 0 20px 0;">上传底片</h2>
                    <input type="file" id="fInput" accept="image/*" style="display:none">
                    <button class="btn-p" onclick="document.getElementById('fInput').click()">点击上传图片</button>
                    <div id="cut-tools" style="display:none; margin-top:30px;">
                        <button class="btn-p" id="ai-btn" style="background:var(--morandi-blue)" onclick="runAI()">🤖 智能抠图</button>
                    </div>
                </div>
            </div>
            <div id="canvas-wrap"><canvas id="mCanvas"></canvas></div>
        </div>
    </main>

    <script>
        const mCanvas = document.getElementById('mCanvas');
        const mCtx = mCanvas.getContext('2d');
        let rawImg = null, cutoutImg = null, selectedInk = "#2B4C9B", isProcessed = false, currentStickerType = null;
        let bpNet = null, scale = 1, posX = 0, posY = 0, isDragging = false, lastX, lastY, lastDist = 0;

        const stickerAssets = { stars: new Image(), y2k: new Image(), dog: new Image(), cat: new Image(), star2: new Image() };
        stickerAssets.stars.src = 'Star.png'; stickerAssets.y2k.src = 'Y2K.png';
        stickerAssets.dog.src = 'Dog.png'; stickerAssets.cat.src = 'Cat.png'; stickerAssets.star2.src = 'Star2.png';

        // 极速加速方案：页面加载即启动预载逻辑
        async function loadModel() {
            if(!bpNet) {
                bpNet = await bodyPix.load({
                    architecture: 'MobileNetV1',
                    outputStride: 16,
                    multiplier: 0.5, // 速度与精度的完美平衡点
                    quantBytes: 2    // 启用 2 字节量化，大幅缩小模型体积并加速计算
                });
            }
        }
        loadModel();

        document.getElementById('fInput').onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.crossOrigin = "Anonymous";
                img.onload = () => { 
                    rawImg = img;
                    mCanvas.width = img.width; mCanvas.height = img.height;
                    document.getElementById('cut-tools').style.display = 'block'; 
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        };

        async function runAI() {
            const btn = document.getElementById('ai-btn');
            btn.innerText = "⏳ 极速抠图中...";
            try {
                await loadModel();
                // 极速设置：internalResolution 设为 low，大幅减少像素计算量
                const seg = await bpNet.segmentPerson(rawImg, {
                    internalResolution: 'low', 
                    segmentationThreshold: 0.7,
                    maxDetections: 1
                });
                
                const mask = bodyPix.toMask(seg, {r:255,g:255,b:255,a:255}, {r:0,g:0,b:0,a:0});
                const offC = document.createElement('canvas');
                offC.width = rawImg.width; offC.height = rawImg.height;
                const oCtx = offC.getContext('2d');
                oCtx.putImageData(mask, 0, 0);
                oCtx.globalCompositeOperation = 'source-in';
                oCtx.drawImage(rawImg, 0, 0);
                
                cutoutImg = offC;
                isProcessed = true;
                document.getElementById('step-layer').style.display = 'none';
                document.getElementById('sidebar').classList.remove('disabled');
                initInteractions();
                draw();
            } catch (e) { alert("AI 引擎稍显疲惫，请刷新页面重试。"); }
            btn.innerText = "🤖 智能抠图";
        }

        function draw() {
            if(!cutoutImg) return;
            const dot = parseInt(document.getElementById('dotIn').value);
            const thr = (11 - parseInt(document.getElementById('threshIn').value)) * 25.5;
            document.getElementById('dotVal').innerText = dot;
            document.getElementById('threshVal').innerText = document.getElementById('threshIn').value;

            const tC = document.createElement('canvas');
            tC.width = mCanvas.width; tC.height = mCanvas.height;
            const tCtx = tC.getContext('2d');
            
            tCtx.save();
            tCtx.translate(mCanvas.width/2 + posX, mCanvas.height/2 + posY);
            tCtx.scale(scale, scale);
            tCtx.drawImage(cutoutImg, -cutoutImg.width/2, -cutoutImg.height/2);
            tCtx.restore();

            const imgData = tCtx.getImageData(0, 0, mCanvas.width, mCanvas.height).data;
            mCtx.clearRect(0, 0, mCanvas.width, mCanvas.height);
            mCtx.fillStyle = selectedInk;

            for(let y=0; y<mCanvas.height; y+=dot) {
                for(let x=0; x<mCanvas.width; x+=dot) {
                    const i = (y * mCanvas.width + x) * 4;
                    if(imgData[i+3] < 128) continue;
                    const gray = imgData[i]*0.3 + imgData[i+1]*0.59 + imgData[i+2]*0.11;
                    if(gray < thr) {
                        mCtx.beginPath(); mCtx.arc(x+dot/2, y+dot/2, (1 - gray/255)*(dot/2.1), 0, Math.PI*2); mCtx.fill();
                    }
                }
            }
            if (currentStickerType) mCtx.drawImage(stickerAssets[currentStickerType], 0, 0, mCanvas.width, mCanvas.height);
        }

        function initInteractions() {
            const start = (e) => {
                isDragging = true;
                const p = e.touches ? e.touches[0] : e;
                lastX = p.clientX; lastY = p.clientY;
                if(e.touches && e.touches.length === 2) {
                    lastDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                }
            };
            const move = (e) => {
                if(!isDragging) return;
                if(e.touches && e.touches.length === 2) {
                    const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                    scale *= dist / lastDist;
                    lastDist = dist;
                } else {
                    const p = e.touches ? e.touches[0] : e;
                    posX += p.clientX - lastX; posY += p.clientY - lastY;
                    lastX = p.clientX; lastY = p.clientY;
                }
                draw();
                e.preventDefault();
            };
            const stop = () => { isDragging = false; lastDist = 0; };
            mCanvas.addEventListener('mousedown', start);
            mCanvas.addEventListener('touchstart', start, {passive:false});
            window.addEventListener('mousemove', move);
            window.addEventListener('touchmove', move, {passive:false});
            window.addEventListener('mouseup', stop);
            window.addEventListener('touchend', stop);
            mCanvas.addEventListener('wheel', (e) => {
                scale += e.deltaY * -0.001;
                scale = Math.max(0.1, Math.min(scale, 5));
                draw();
                e.preventDefault();
            }, {passive:false});
        }

        function toggleStickerMenu() {
            if(!isProcessed) return;
            const menu = document.getElementById('sticker-menu');
            menu.style.display = (menu.style.display === 'flex') ? 'none' : 'flex';
        }
        function applyRealSticker(type) {
            currentStickerType = (currentStickerType === type) ? null : type;
            draw(); document.getElementById('sticker-menu').style.display = 'none';
        }
        function randomize() {
            document.getElementById('dotIn').value = Math.floor(Math.random()*9)+1;
            document.getElementById('threshIn').value = Math.floor(Math.random()*9)+1;
            const colors = ['#2B4C9B', '#6F4E37', '#8DA86D', '#D43F8D', '#E8A1B5', '#8C847D', '#7B9B8E'];
            selectedInk = colors[Math.floor(Math.random()*colors.length)];
            document.getElementById('inkPrev').style.background = selectedInk;
            document.getElementById('inkColor').value = selectedInk;
            draw();
        }
        function exportArt() {
            const link = document.createElement('a');
            link.download = 'VibePrint.png';
            link.href = mCanvas.toDataURL(); link.click();
        }
        document.querySelectorAll('input').forEach(i => i.oninput = draw);
        document.getElementById('inkColor').onchange = (e) => {
            selectedInk = e.target.value;
            document.getElementById('inkPrev').style.background = selectedInk;
            draw();
        };
    </script>
</body>
</html>
