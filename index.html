<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VibePrinting :D - Morandi Art Studio</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/body-pix@2.2.0/dist/body-pix.min.js"></script>
    <style>
        :root {
            --bg-color: rgb(251, 242, 245);
            --panel-bg: #FEFDF5;
            --text-brown: #625044;
            --morandi-green: #bfda9d;
            --morandi-blue: #95c5e8;
            --radius-box: 20px;
            --shadow: 0 10px 30px rgba(111, 78, 55, 0.08);
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-brown);
            font-family: -apple-system, "SF Pro SC", "Noto Sans SC", sans-serif;
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }
        nav {
            height: 70px; background: var(--panel-bg); display: flex; 
            justify-content: space-between; align-items: center; 
            padding: 0 40px; border-bottom: 2px solid rgba(111, 78, 55, 0.05); z-index: 1000;
        }
        .logo { font-weight: 900; font-size: 1.6rem; letter-spacing: 1px; }
        .btn-p {
            background: var(--text-brown); color: white; border: none;
            padding: 12px 28px; border-radius: 50px;
            cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        main { flex: 1; display: flex; position: relative; }
        .sidebar {
            width: 320px; padding: 25px; background: rgba(254, 253, 245, 0.4);
            display: flex; flex-direction: column; gap: 15px; border-right: 1px solid rgba(111, 78, 55, 0.05);
            overflow-y: auto;
        }
        .control-group { background: var(--panel-bg); padding: 18px 22px; border-radius: var(--radius-box); box-shadow: var(--shadow); display: flex; flex-direction: column; gap: 12px; }
        .workspace { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px; position: relative; }
        #canvas-wrap { position: relative; border-radius: var(--radius-box); overflow: hidden; box-shadow: var(--shadow); }
        canvas { max-width: 100%; max-height: 80vh; background: white; }
        .overlay { position: absolute; inset: 0; background: var(--bg-color); z-index: 500; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .upload-card { background: var(--panel-bg); padding: 50px; border-radius: 32px; box-shadow: var(--shadow); text-align: center; width: 400px; }
        .disabled { opacity: 0.3; pointer-events: none; filter: grayscale(1); }
        .sticker-container { position: relative; width: 100%; margin-top: auto; }
        #sticker-menu { position: absolute; bottom: 70px; left: 50%; transform: translateX(-50%); background: white; border-radius: 15px; border: 2px solid var(--text-brown); padding: 10px; display: none; flex-direction: column; gap: 8px; box-shadow: var(--shadow); z-index: 2000; width: 150px; }
        
        /* --- 修正：更强力的手机端适配 CSS --- */
        @media screen and (max-width: 768px) {
            body { height: auto; overflow-y: auto !important; }
            nav { padding: 0 15px; height: 60px; }
            main { flex-direction: column !important; height: auto; }
            .sidebar { 
                width: 100% !important; box-sizing: border-box; padding: 15px; 
                border-right: none; border-top: 1px solid rgba(0,0,0,0.05);
                order: 2; overflow: visible;
            }
            .workspace { width: 100%; padding: 15px; box-sizing: border-box; order: 1; min-height: 350px; }
            .upload-card { width: 85%; padding: 20px; }
            #sticker-menu { bottom: 100%; margin-bottom: 10px; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">VibePrinting</div>
        <div style="display:flex; gap:10px;">
            <button class="btn-p" style="background:#B9B4A7; padding: 8px 15px;" onclick="location.reload()">重置</button>
            <button class="btn-p" style="padding: 8px 15px;" onclick="exportArt()">导出</button>
        </div>
    </nav>
    <main>
        <aside id="sidebar" class="sidebar disabled">
            <div class="control-group">
                <label>颜色</label>
                <div style="display:flex; align-items:center; gap:15px;">
                    <div id="inkPrev" class="color-preview" style="width:40px; height:40px; border-radius:10px; background:#2B4C9B; border:2px solid #fff; box-shadow:var(--shadow); cursor:pointer;" onclick="document.getElementById('inkColor').click()"></div>
                    <input type="color" id="inkColor" value="#2B4C9B" style="opacity:0; width:0; height:0;">
                </div>
            </div>
            <div id="manual-controls" class="control-group" style="display:none; border: 2px solid var(--morandi-blue);">
                <label>涂抹确认</label>
                <button class="btn-p" onclick="finalizeCutout()">完成抠图</button>
            </div>
            <div class="control-group">
                <label>网点/对比度</label>
                <input type="range" id="dotIn" min="1" max="10" value="7" oninput="draw()">
                <input type="range" id="threshIn" min="1" max="10" value="5" oninput="draw()">
            </div>
            <button class="btn-p" style="background: var(--morandi-blue);" onclick="randomize()">🎲 随机参数</button>
            <div class="sticker-container">
                <div id="sticker-menu">
                    <button class="sticker-opt" onclick="applyRealSticker('stars')">星星</button>
                    <button class="sticker-opt" onclick="applyRealSticker('y2k')">复古y2k</button>
                </div>
                <button class="btn-p" style="width:100%; background: var(--morandi-green);" onclick="toggleStickerMenu()">🌟 贴纸</button>
            </div>
        </aside>
        <div class="workspace">
            <div id="step-layer" class="overlay">
                <div class="upload-card">
                    <h2>上传底片</h2>
                    <input type="file" id="fInput" accept="image/*" style="display:none">
                    <button class="btn-p" id="upload-trigger" onclick="document.getElementById('fInput').click()">选择图片</button>
                    <div id="cut-tools" style="display:none; margin-top:20px;">
                        <button class="btn-p" id="ai-btn" style="background:var(--morandi-blue); margin:5px;" onclick="runAI()">🤖 智能抠图</button>
                        <button class="btn-p" style="background:#B9B4A7; margin:5px;" onclick="runManual()">🖌️ 手动涂抹</button>
                    </div>
                </div>
            </div>
            <div id="canvas-wrap"><canvas id="mCanvas"></canvas></div>
        </div>
    </main>
    <script>
        const mCanvas = document.getElementById('mCanvas');
        const mCtx = mCanvas.getContext('2d');
        let rawImg = null, cutoutImg = null, selectedInk = "#2B4C9B", bpNet = null, isProcessed = false, currentStickerType = null;
        const maskCanvas = document.createElement('canvas');
        const msCtx = maskCanvas.getContext('2d');
        const stickerAssets = { stars: new Image(), y2k: new Image() };
        stickerAssets.stars.src = 'Star.png'; stickerAssets.y2k.src = 'Y2K.png';

        // 优化 1：页面加载瞬间就开始悄悄预载模型，节省用户等待时间
        async function preloadModel() {
            try {
                await tf.ready();
                bpNet = await bodyPix.load({
                    architecture: 'MobileNetV1',
                    outputStride: 16,
                    multiplier: 0.5,
                    quantBytes: 2
                });
                console.log("AI 已就绪");
            } catch(e) { console.log("预载失败"); }
        }
        preloadModel();

        document.getElementById('fInput').onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.crossOrigin = "Anonymous";
                img.onload = () => { 
                    // 优化 2：如果图片太大，手机端自动等比例缩小，极大提升处理速度
                    const maxSide = 1000;
                    if(img.width > maxSide || img.height > maxSide) {
                        const ratio = Math.min(maxSide/img.width, maxSide/img.height);
                        mCanvas.width = img.width * ratio; mCanvas.height = img.height * ratio;
                    } else {
                        mCanvas.width = img.width; mCanvas.height = img.height;
                    }
                    rawImg = img; 
                    document.getElementById('cut-tools').style.display = 'block';
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        };

        async function runAI() {
            const btn = document.getElementById('ai-btn');
            btn.innerText = "⏳ 处理中..."; btn.disabled = true;
            
            try {
                if(!bpNet) await preloadModel();
                // 优化 3：极速抠图设置
                const seg = await bpNet.segmentPerson(rawImg, {
                    internalResolution: 'low',
                    segmentationThreshold: 0.7
                });
                const mask = bodyPix.toMask(seg, {r:255,g:255,b:255,a:255}, {r:0,g:0,b:0,a:0});
                maskCanvas.width = mCanvas.width; maskCanvas.height = mCanvas.height;
                msCtx.putImageData(mask, 0, 0);
                finalizeCutout();
            } catch (e) { runManual(); }
            btn.innerText = "🤖 智能抠图"; btn.disabled = false;
        }

        function runManual() {
            maskCanvas.width = mCanvas.width; maskCanvas.height = mCanvas.height;
            document.getElementById('step-layer').style.display = 'none';
            document.getElementById('sidebar').classList.remove('disabled');
            document.getElementById('manual-controls').style.display = 'flex';
            msCtx.fillStyle = 'black'; msCtx.fillRect(0,0,maskCanvas.width,maskCanvas.height);
            initDrawEvents();
        }

        function finalizeCutout() {
            document.getElementById('step-layer').style.display = 'none';
            document.getElementById('sidebar').classList.remove('disabled');
            document.getElementById('manual-controls').style.display = 'none';
            const offC = document.createElement('canvas');
            offC.width = mCanvas.width; offC.height = mCanvas.height;
            const oCtx = offC.getContext('2d');
            oCtx.drawImage(rawImg, 0, 0, mCanvas.width, mCanvas.height);
            oCtx.globalCompositeOperation = 'destination-in';
            oCtx.drawImage(maskCanvas, 0, 0);
            cutoutImg = offC; isProcessed = true; draw();
        }

        function draw() {
            if(!cutoutImg) return;
            const dot = parseInt(document.getElementById('dotIn').value);
            const thr = (11 - parseInt(document.getElementById('threshIn').value)) * 25.5;
            mCtx.clearRect(0,0,mCanvas.width,mCanvas.height);
            const data = cutoutImg.getContext('2d').getImageData(0,0,mCanvas.width,mCanvas.height).data;
            mCtx.fillStyle = selectedInk;
            for(let y=0; y<mCanvas.height; y+=dot) {
                for(let x=0; x<mCanvas.width; x+=dot) {
                    const i = (y * mCanvas.width + x) * 4;
                    if(data[i+3] < 128) continue;
                    const g = data[i]*0.3 + data[i+1]*0.59 + data[i+2]*0.11;
                    if(g < thr) {
                        mCtx.beginPath(); mCtx.arc(x+dot/2, y+dot/2, (1 - g/255)*(dot/2.1), 0, Math.PI*2); mCtx.fill();
                    }
                }
            }
            if (currentStickerType) mCtx.drawImage(stickerAssets[currentStickerType], 0, 0, mCanvas.width, mCanvas.height);
        }

        function applyRealSticker(t) { currentStickerType = (currentStickerType === t) ? null : t; draw(); toggleStickerMenu(); }
        function toggleStickerMenu() { const m = document.getElementById('sticker-menu'); m.style.display = m.style.display === 'flex' ? 'none' : 'flex'; }
        function randomize() { 
            document.getElementById('dotIn').value = Math.floor(Math.random()*7)+3; 
            document.getElementById('threshIn').value = Math.floor(Math.random()*5)+3; 
            draw(); 
        }
        function exportArt() { const l = document.createElement('a'); l.download='vibe.png'; l.href=mCanvas.toDataURL(); l.click(); }
        document.getElementById('inkColor').onchange = (e) => { selectedInk = e.target.value; document.getElementById('inkPrev').style.background = selectedInk; draw(); };
        function initDrawEvents() {
            let d = false;
            const move = (e) => {
                if(!d) return;
                const r = mCanvas.getBoundingClientRect();
                const x = ((e.touches ? e.touches[0].clientX : e.clientX) - r.left) * (mCanvas.width/r.width);
                const y = ((e.touches ? e.touches[0].clientY : e.clientY) - r.top) * (mCanvas.height/r.height);
                msCtx.fillStyle = 'white'; msCtx.beginPath(); msCtx.arc(x,y,20,0,Math.PI*2); msCtx.fill();
            };
            mCanvas.onmousedown = mCanvas.ontouchstart = (e) => { d = true; move(e); e.preventDefault(); };
            window.onmouseup = window.ontouchend = () => d = false;
            mCanvas.onmousemove = mCanvas.ontouchmove = move;
        }
    </script>
</body>
</html>
